name: Hugin Desktop Release Pipeline

on:
    push:
        branches:
            - master
        tags:
            - '*'

jobs:
    create-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        outputs:
            upload_url: ${{ steps.create_release.outputs.upload_url }}

        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Create Release
              id: create_release
              # actions/create-release@v1 is archived. softprops/action-gh-release
              # is the community-standard drop-in replacement and stays
              # compatible with the same outputs (upload_url etc).
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: true
                  prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}

    build:
        name: 'Build: ${{ matrix.config.name }} / ${{ matrix.config.platform }}'
        runs-on: ${{ matrix.config.os }}
        needs: [create-release]

        strategy:
            fail-fast: true
            matrix:
                config:
                    - { name: 'Windows Latest', os: windows-latest, platform: x64 }
                    - { name: 'Ubuntu Latest', os: ubuntu-latest, platform: x64 }
                    - { name: 'macOS arm64', os: macos-latest, platform: arm64 }

        env:
            PLATFORM: ${{ matrix.config.platform }}
            VERSION: ${{ github.ref_name }} # This extracts the tag name
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install python-setuptools on macOS
              # Python 3.12 dropped distutils; some node-gyp scripts still ask
              # for it via setuptools. Cheap install, safe on all macOS runners.
              if: startsWith(matrix.config.os, 'macos')
              run: brew install python-setuptools

            - name: Install libudev + X11 headers
              if: matrix.config.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential \
                      libx11-dev \
                      libxt-dev \
                      libxtst-dev \
                      libxkbfile-dev \
                      libxrandr-dev \
                      libxi-dev \
                      libxinerama-dev \
                      libxcursor-dev \
                      libudev-dev

            - name: Install the Apple certificate and provisioning profile
              if: matrix.config.os == 'macos-latest'
              env:
                  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
                  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
                  BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
                  PP_PATH=$RUNNER_TEMP/61be0696-8d71-4a17-8f96-53c50b8c6fdd.provisionprofile
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

                  # Import certificate and provisioning profile from secrets
                  echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
                  echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

                  # Create temporary keychain
                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  # Import certificate to keychain
                  security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

                  # Apply provisioning profile
                  mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
                  cp $PP_PATH ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
                  mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                  cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
                  cp $PP_PATH .
                  cp $PP_PATH bin/
                  ls
                  ls bin
                  security find-identity -p codesigning -v

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install a fresh node-gyp
              # electron-rebuild's postinstall shells out to node-gyp. The npm
              # bundled with Node 20 ships a node-gyp too old to find VS 2022
              # via the registry on windows-latest runners, so install a modern
              # one globally before pnpm install. Same pattern the pre-pnpm
              # workflows used (`npm i node-gyp` before install).
              run: npm install -g node-gyp@latest
              shell: bash

            - name: Install dependencies
              # --frozen-lockfile: fail if pnpm-lock.yaml drifts from package.json.
              # Releases especially must use the exact lockfile that was reviewed.
              run: pnpm install --frozen-lockfile

            - name: Build ${{ matrix.config.name }}
              if: matrix.config.os == 'windows-latest'
              run: pnpm run build:win-x64-gh

            - name: Build ${{ matrix.config.name }}
              if: matrix.config.os == 'ubuntu-latest'
              run: pnpm run build:linux-x64-gh

            - name: Build ${{ matrix.config.name }}
              if: matrix.config.os == 'macos-latest'
              env:
                  appleId: ${{ secrets.APPLE_ID }}
                  appleIdPassword: ${{ secrets.APP_SPECIFIC_PASSWORD }}
                  teamId: ${{ secrets.TEAM_ID }}
              run: pnpm run build:mac-$PLATFORM-gh
