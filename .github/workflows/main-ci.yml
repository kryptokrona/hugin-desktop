name: Hugin Desktop Main Pipeline

env:
    GITHUB_REGISTRY: 'ghcr.io'
    GITHUB_OWNER: 'kryptokrona'
    GH_TOKEN: ${{ secrets.HUGIN_DESKTOP_SECRET }}
    # Explicit hint for node-gyp on Windows so it doesn't fall back to
    # registry-detection guesswork inside electron-rebuild's postinstall.
    # Harmless on Linux/macOS (they ignore it).
    GYP_MSVS_VERSION: '2022'
    # See pr-ci.yml — Electron 30's v8 headers need C++17 and gyp defaults
    # to something older. Safe globally (MSVC ignores CXXFLAGS).
    CXXFLAGS: '-std=gnu++17'

on:
    push:
        branches:
            - main
        paths-ignore:
            - '*.md'
            - '.run/**'
            - '.github/ISSUE_TEMPLATE/**'

concurrency:
    # Only one main build at a time — later pushes cancel the in-flight one.
    group: main-ci
    cancel-in-progress: false

jobs:
    build:
        name: 'Build: ${{ matrix.config.name }} / ${{ matrix.config.platform }}'
        runs-on: ${{ matrix.config.os }}

        strategy:
            fail-fast: true
            matrix:
                config:
                    - { name: 'Windows Latest', os: windows-latest, platform: x64 }
                    - { name: 'Ubuntu Latest', os: ubuntu-latest, platform: x64 }
                    - { name: 'macOS x64', os: macos-13, platform: x64 }
                    - { name: 'macOS arm64', os: macos-latest, platform: arm64 }

        env:
            PLATFORM: ${{ matrix.config.platform }}

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install libudev + X11 headers
              if: matrix.config.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential \
                      libx11-dev \
                      libxt-dev \
                      libxtst-dev \
                      libxkbfile-dev \
                      libxrandr-dev \
                      libxi-dev \
                      libxinerama-dev \
                      libxcursor-dev \
                      libudev-dev

            - name: Install pnpm
              # Uses the version declared via `packageManager` in package.json.
              uses: pnpm/action-setup@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Set up MSBuild (Windows)
              # See pr-ci.yml for the reasoning. Microsoft-maintained action
              # puts MSBuild.exe on PATH; GYP_MSVS_VERSION at workflow env
              # level pins node-gyp to VS 2022.
              if: matrix.config.os == 'windows-latest'
              uses: microsoft/setup-msbuild@v2

            - name: Install dependencies
              # --frozen-lockfile: fail if pnpm-lock.yaml drifts from package.json.
              # `.npmrc`'s node-linker=hoisted gives us the flat tree Electron needs.
              run: pnpm install --frozen-lockfile

            - name: Build ${{ matrix.config.name }}
              if: matrix.config.os == 'windows-latest'
              run: pnpm run build:win-${{ matrix.config.platform }}

            - name: Build ${{ matrix.config.name }}
              if: matrix.config.os == 'ubuntu-latest'
              run: pnpm run build:linux-${{ matrix.config.platform }}

            - name: Build ${{ matrix.config.name }}
              if: startsWith(matrix.config.os, 'macos')
              run: pnpm run build:mac-${{ matrix.config.platform }}

            - name: 'Upload ${{ matrix.config.name }} Artifact'
              uses: actions/upload-artifact@v4
              if: matrix.config.os == 'windows-latest'
              with:
                  name: windows-latest
                  path: |
                      dist/*.exe

            - name: 'Upload ${{ matrix.config.name }} Deb Artifact'
              uses: actions/upload-artifact@v4
              if: matrix.config.os == 'ubuntu-latest'
              with:
                  name: ubuntu-latest-deb
                  path: |
                      dist/*.deb

            - name: 'Upload ${{ matrix.config.name }} Snap Artifact'
              uses: actions/upload-artifact@v4
              if: matrix.config.os == 'ubuntu-latest'
              with:
                  name: ubuntu-latest-snap
                  path: |
                      dist/*.snap

            - name: 'Upload ${{ matrix.config.name }} Artifact'
              uses: actions/upload-artifact@v4
              if: matrix.config.name == 'macOS x64'
              with:
                  name: macos-x64
                  path: |
                      dist/*.dmg

            - name: 'Upload ${{ matrix.config.name }} Artifact'
              uses: actions/upload-artifact@v4
              if: matrix.config.name == 'macOS arm64'
              with:
                  name: macos-arm64
                  path: |
                      dist/*.dmg
